version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -e "const fs=require('fs'); const o=JSON.parse(fs.readFileSync('amplify_outputs.json')); o.custom.contactApiUrl=process.env.CONTACT_API_URL; fs.writeFileSync('amplify_outputs.json', JSON.stringify(o, null, 2));"
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/kelvin-portfolio/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
